# dev-quickstart connector registry.
# Order here = order in the menu.
#
# format:  name | label | contact | help_url | note
# EDIT the contact emails / help URLs below to your real team values.
# Leave a field blank with just the surrounding pipes.

repos       | Source repos (GitLab)          | CHANGEME@mastersindia.co |                                  | Needs: GitLab account + the repo list & prod branches (fill config/repos.conf)
graphify    | Graphify knowledge graph       | CHANGEME@mastersindia.co |                                  | CLI for cheap codebase Q&A; may be an internal tool
vpn         | Company VPN (L2TP)             | CHANGEME@mastersindia.co |                                  | Needs: VPN server + shared secret + your own VPN login
databases   | Mongo + Postgres (read-only)  | CHANGEME@mastersindia.co |                                  | Needs: read-only connection strings / creds. VPN required
metabase    | Metabase (analytics)          | CHANGEME@mastersindia.co |                                  | Needs: your Metabase login; copy the session cookie
s3          | S3 raw-archive (read-only)    | CHANGEME@mastersindia.co |                                  | Needs: read-only AWS access key + secret
gmail_drive | Gmail + Drive (as you)        | CHANGEME@mastersindia.co | https://console.cloud.google.com | Get shared credentials.json from contact, then OAuth as yourself
notion      | Notion (MCP)                   |                          | https://www.notion.so            | Adds a Claude Code MCP server; you authorize with your own Notion login
jira        | Jira / Confluence (MCP)       |                          | https://www.atlassian.com        | Adds a Claude Code MCP server; you authorize with your own Atlassian login
