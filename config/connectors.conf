# dev-quickstart connector registry.
# Order here = order in the menu.
#
# format:  name | label | contact | help_url | note
#   contact  = OPTIONAL email to show ("Need access? Contact: ..."). Leave blank
#              (just the surrounding pipes) if devs arrange access themselves.
#   help_url = OPTIONAL link shown as "Help: ...".
#   note     = what the dev needs to have / do for this connector.

repos       | Source repos (GitLab)          |  |                                  | Needs a GitLab account + VPN. Copy config/repos.conf.example to config/repos.conf and list the repos you want.
graphify    | Graphify knowledge graph       |  |                                  | CLI for cheap codebase Q&A. Tries to install from PyPI; if that fails it's an internal tool — ask your team.
vpn         | Company VPN (L2TP)             |  |                                  | Needs the VPN server address + shared secret + your own VPN login from IT/onboarding.
databases   | Mongo + Postgres (read-only)  |  |                                  | Needs read-only connection strings from whoever owns the databases. VPN required to connect.
metabase    | Metabase (analytics)          |  |                                  | Log in to Metabase in a browser; this tool shows how to copy your session cookie.
s3          | S3 raw-archive (read-only)    |  |                                  | Needs read-only AWS access key + secret from whoever owns the bucket.
gmail_drive | Gmail + Drive (as you)        |  | https://console.cloud.google.com | Get the shared credentials.json from your team (or make your own), then sign in as yourself.
notion      | Notion (MCP)                   |  | https://www.notion.so            | Adds a Claude Code MCP server. Authorize with your own Notion login when prompted.
jira        | Jira / Confluence (MCP)       |  | https://www.atlassian.com        | Adds a Claude Code MCP server. Authorize with your own Atlassian login when prompted.
